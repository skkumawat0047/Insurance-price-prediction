<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insurance-Price-Prediction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <div class="box">
        <h1 class="heading">Insurance-Price-Prediction-System</h1>
        <form class="form" action="/predict" method="post">
            <label for="age">Enter age:</label>
            <input type="number" name="age" id="age" required>
            <label for="gender">Enter gender(male:1,female:0):</label>
            <input type="number" name="gender" id="gender" required>
            <label for="BMI">Enter BMI:</label>
            <input type="number" name="bmi" id="bmi" required>
            <label for="children">Enter children:</label>
            <input type="number" name="children" id="children" required>
            <label for="smoker">Enter smoker(yes:1,no:0):</label>
            <input type="number" name="smoker" id="smoker" required>
            <button id="predict">Get Prediction</button>
        </form>
        {% if result %}
        <h2>Predicted Price: ₹{{ result }}</h2>
        {% endif %}
    </div>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>

</html>
